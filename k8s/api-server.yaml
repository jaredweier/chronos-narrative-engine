apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  labels:
    app: chronos
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chronos
      tier: backend
  template:
    metadata:
      labels:
        app: chronos
        tier: backend
    spec:
      containers:
      - name: api-server
        image: your-registry/chronos-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: chronos-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
spec:
  selector:
    app: chronos
    tier: backend
  ports:
  - port: 8000
    targetPort: 8000
