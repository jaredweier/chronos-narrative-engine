version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

  chronos:
    build: .
    ports:
      - "8501:8501"
    environment:
      - CHRONOS_OLLAMA_URL=http://ollama:11434
      - CHRONOS_DB_FILENAME=/data/department_reports.db
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=4096
    volumes:
      - chronos_data:/data
    depends_on:
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ollama_data:
  chronos_data:
